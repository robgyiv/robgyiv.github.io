    <script>
    (function () {
        var btn = document.getElementById('mode-toggle');
        if (!btn) return;

        function updateLabel() {
            var isFluoro = document.documentElement.classList.contains('fluoro');
            btn.textContent = isFluoro ? 'PAPER' : 'FLUORO';
            btn.title = isFluoro ? 'Switch to paper mode' : 'Switch to fluoro mode';
        }

        updateLabel();

        btn.addEventListener('click', function () {
            var html = document.documentElement;
            if (html.classList.contains('fluoro')) {
                html.classList.remove('fluoro');
                localStorage.setItem('rave-mode', 'paper');
            } else {
                html.classList.add('fluoro');
                localStorage.setItem('rave-mode', 'fluoro');
            }
            updateLabel();
        });
    })();
    </script>
